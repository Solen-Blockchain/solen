# Nginx reverse proxy config for Solen testnet services.
#
# Services:
#   testnet-rpc.solenchain.com    → solen-node RPC (port 19944)
#   testnet-faucet.solenchain.com → solen-faucet (port 8080)
#   testnet-api.solenchain.com    → solen-node indexer API (port 19955)
#
# Mainnet will use rpc.solenchain.com, api.solenchain.com (no prefix).

# RPC endpoint
server {
    listen 443 ssl;
    server_name testnet-rpc.solenchain.com;

    ssl_certificate     /etc/letsencrypt/live/solenchain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solenchain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:19944;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }
}

# Faucet
server {
    listen 443 ssl;
    server_name testnet-faucet.solenchain.com;

    ssl_certificate     /etc/letsencrypt/live/solenchain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solenchain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

# Indexer / Explorer API
server {
    listen 443 ssl;
    server_name testnet-api.solenchain.com;

    ssl_certificate     /etc/letsencrypt/live/solenchain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solenchain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:19955;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name testnet-rpc.solenchain.com testnet-faucet.solenchain.com testnet-api.solenchain.com;
    return 301 https://$host$request_uri;
}
