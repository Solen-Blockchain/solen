# Nginx reverse proxy config for Solen testnet services.
#
# Services:
#   rpc.solenchain.com      → solen-node RPC (port 19944)
#   faucet.solenchain.com   → solen-faucet (port 8080)
#   explorer.solenchain.com → solenscan (separate project)
#   api.solenchain.com      → solen-node indexer API (port 19955)

# RPC endpoint
server {
    listen 443 ssl;
    server_name rpc.solenchain.com;

    # SSL certs (use certbot/Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/solenchain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solenchain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:19944;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow JSON-RPC POST
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }
}

# Faucet
server {
    listen 443 ssl;
    server_name faucet.solenchain.com;

    ssl_certificate     /etc/letsencrypt/live/solenchain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solenchain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

# Indexer / Explorer API
server {
    listen 443 ssl;
    server_name api.solenchain.com;

    ssl_certificate     /etc/letsencrypt/live/solenchain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/solenchain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:19955;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name rpc.solenchain.com faucet.solenchain.com api.solenchain.com;
    return 301 https://$host$request_uri;
}
